<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Breath - Stable</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg-color: #fdfbf7;
      --circle-color: #94bbe9;
      --accent-color: #4a90e2;
      --text-color: #444;
    }

    .dark-theme {
      --bg-color: #1a202c;
      --circle-color: #4a5568;
      --accent-color: #63b3ed;
      --text-color: #e2e8f0;
    }

    .sakura-theme {
      --bg-color: #fff5f7;
      --circle-color: #feb2b2;
      --accent-color: #f687b3;
      --text-color: #702459;
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-color);
      font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
      color: var(--text-color);
      transition: all 0.5s ease;
      overflow: hidden;
      transform: scale(0.9);
    }

    .info-panel {
      text-align: center;
      margin-bottom: 10px;
    }

    .timer-display {
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--accent-color);
    }

    #sub-msg {
      font-size: 0.9rem;
      margin-top: 5px;
    }

    .container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 280px;
      width: 280px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .circle {
      background-color: var(--circle-color);
      height: 140px;
      width: 140px;
      border-radius: 50%;
      position: absolute;
      transition: transform 4s cubic-bezier(0.44, 0.05, 0.55, 0.95);
      opacity: 0.7;
    }

    .text-overlay {
      position: relative;
      z-index: 10;
      font-size: 1.5rem;
      font-weight: bold;
      pointer-events: none;
      letter-spacing: 0.1em;
    }

    .outline {
      width: 260px;
      height: 260px;
      border: 2px solid #ddd;
      border-radius: 50%;
      position: absolute;
      opacity: 0.3;
      pointer-events: none;
    }

    .progress-container {
      width: 70%;
      max-width: 260px;
      height: 4px;
      background: rgba(0, 0, 0, 0.05);
      margin-top: 30px;
      border-radius: 2px;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent-color);
      transition: width 1s linear;
    }

    .controls {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .mode-buttons {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      font-weight: bold;
      color: #444;
    }

    button.active {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
    }

    .theme-selector {
      margin-top: 10px;
      text-align: center;
      background: rgba(0, 0, 0, 0.03);
      padding: 10px;
      border-radius: 12px;
    }

    .theme-buttons {
      display: flex;
      gap: 8px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="info-panel">
    <div id="timer" class="timer-display">03:00</div>
    <p id="sub-msg">サークルをタップして開始</p>
  </div>

  <div class="container" id="main-trigger">
    <div class="circle" id="circle"></div>
    <div id="instruction" class="text-overlay">READY</div>
    <div class="outline"></div>
  </div>

  <div class="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div class="controls">
    <div class="mode-buttons">
      <button onclick="setDuration(60)" id="btn-60">1分間</button>
      <button onclick="setDuration(180)" id="btn-180" class="active">3分間</button>
    </div>
    <div class="theme-selector">
      <div class="theme-buttons">
        <button onclick="setTheme('default')">標準</button>
        <button onclick="setTheme('dark')">夜間</button>
        <button onclick="setTheme('sakura')">癒やし</button>
      </div>
    </div>
  </div>

  <script>
    const circle = document.getElementById('circle');
    const instruction = document.getElementById('instruction');
    const timerDisplay = document.getElementById('timer');
    const mainTrigger = document.getElementById('main-trigger');
    const progressBar = document.getElementById('progress-bar');
    const subMsg = document.getElementById('sub-msg');

    let duration = 180;
    let timeLeft = 0;
    let timerInterval = null;
    let cycleTimeout = null;
    let isRunning = false;
    let audioCtx = null;
    let cycleCount = 0;

    // 音声エンジンの準備
    const synth = window.speechSynthesis;

    // Android対策：声をあらかじめ読み込む
    function loadVoices() {
      synth.getVoices();
    }
    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = loadVoices;
    }

    function speak(text) {
      if (synth.speaking) synth.cancel();
      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = 'ja-JP';
      uttr.rate = 1.0;
      uttr.pitch = 1.0;
      uttr.volume = 0.6;
      synth.speak(uttr);
    }

    function playTone(freq, dur, vol = 0.15) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
      } catch (e) { console.error(e); }
    }

    function setDuration(sec) {
      if (isRunning) return;
      duration = sec;
      updateDisplay(sec);
      document.getElementById('btn-60').className = (sec === 60 ? 'active' : '');
      document.getElementById('btn-180').className = (sec === 180 ? 'active' : '');
    }

    function setTheme(theme) {
      document.body.className = (theme === 'default' ? '' : theme + '-theme');
    }

    function updateDisplay(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function runCycle() {
      if (!isRunning) return;

      const steps = [
        { text: '吐いて...', scale: '1.0', freq: 440, voice: '息をはいて' },
        { text: '止めて', scale: '1.0', freq: 660, voice: 'とめて' },
        { text: '吸って...', scale: '1.8', freq: 880, voice: '息をすって' },
        { text: '止めて', scale: '1.8', freq: 660, voice: 'とめて' }
      ];

      let stepIdx = 0;
      const nextStep = () => {
        if (!isRunning) return;
        playTone(steps[stepIdx].freq, 0.2, 0.2);
        if (cycleCount === 0) speak(steps[stepIdx].voice);
        if (navigator.vibrate) navigator.vibrate(50);
        instruction.innerText = steps[stepIdx].text;
        circle.style.transform = `scale(${steps[stepIdx].scale})`;
        stepIdx = (stepIdx + 1) % steps.length;
        if (stepIdx === 0) cycleCount++;
        cycleTimeout = setTimeout(nextStep, 4000);
      };
      nextStep();
    }

    function startSession() {
      isRunning = true;
      timeLeft = duration;
      cycleCount = 0;
      subMsg.innerText = "タップで中止";

      // Android対策：タップイベント内で音声とAudioContextを活性化させる
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

      speak("始めます。息をはいてください");
      runCycle();
      timerInterval = setInterval(() => {
        timeLeft--;
        updateDisplay(timeLeft);
        if (timeLeft > 0) playTone(330, 0.05, 0.08);
        progressBar.style.width = `${((duration - timeLeft) / duration) * 100}%`;
        if (timeLeft <= 0) finishSession();
      }, 1000);
    }

    function stopSession() {
      isRunning = false;
      clearInterval(timerInterval);
      clearTimeout(cycleTimeout);
      if (synth.speaking) synth.cancel();
      instruction.innerText = 'READY';
      subMsg.innerText = "サークルをタップして開始";
      circle.style.transform = 'scale(1.0)';
      progressBar.style.width = '0%';
      updateDisplay(duration);
    }

    function finishSession() {
      isRunning = false;
      clearInterval(timerInterval);
      clearTimeout(cycleTimeout);
      instruction.innerText = '完了';
      const msgs = ["リフレッシュ完了", "心のリセット完了", "穏やかな気持ちで"];
      const msg = msgs[Math.floor(Math.random() * msgs.length)];
      subMsg.innerText = msg;
      speak(msg);
      setTimeout(stopSession, 5000);
    }

    mainTrigger.addEventListener('click', () => {
      isRunning ? stopSession() : startSession();
    });
    updateDisplay(duration);
  </script>
</body>
</html>
